<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Tienda - Stockware POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0B1120] flex items-center justify-center h-screen selection:bg-indigo-500 selection:text-white">

  <div class="bg-slate-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800 fade-in">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-white">
          Stock<span class="text-indigo-500">wear</span>
        </h1>
        <p class="text-slate-400 mt-2 text-sm">Ingresá tus credenciales para gestionar tu tienda</p>
    </div>

    <form onsubmit="event.preventDefault(); window.login();" class="space-y-5">
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
            <input id="email" type="email" placeholder="nombre@stockware.com"
            class="w-full p-3.5 bg-slate-800 border border-slate-700 text-white rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition placeholder-slate-500">
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Contraseña</label>
            <input id="password" type="password" placeholder="••••••••"
            class="w-full p-3.5 bg-slate-800 border border-slate-700 text-white rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition placeholder-slate-500">
        </div>

        <button id="loginBtn" type="submit"
        class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(99,102,241,0.2)] hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] transition-all active:scale-[0.98] mt-2 flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
        ingresar
        </button>
    </form>
    
    <p class="text-center text-xs text-slate-500 mt-8">
        ¿Problemas con tu acceso? Contactá a soporte.
    </p>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
