<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador - Stockware</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0B1120] text-slate-300 min-h-screen p-8 selection:bg-indigo-500 selection:text-white">

  <div class="max-w-6xl mx-auto fade-in">
    <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold text-white">Administrar tiendas</h1>
          <p class="text-slate-400 mt-1">Gestión de suscripciones y clientes.</p>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="logout()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium text-sm text-red-400 border border-red-500/20 bg-red-500/10 hover:bg-red-500/20 transition-all active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Salir
            </button>
            <button onclick="openNewStoreModal()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2.5 rounded-xl font-semibold shadow-[0_0_15px_rgba(99,102,241,0.2)] hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] transition-all flex items-center gap-2 active:scale-95">
                <span>+</span> Nueva tienda
            </button>
        </div>
    </div>

    <div id="storesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>
  </div>

  <div id="newStoreModal" class="fixed inset-0 bg-[#0B1120]/80 backdrop-blur-sm hidden flex items-center justify-center z-50">
      <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 w-full max-w-md shadow-2xl m-4 fade-in">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-white">Nueva tienda</h2>
            <button onclick="closeModal()" class="text-slate-500 hover:text-white text-2xl leading-none transition">&times;</button>
          </div>
          
          <div class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Nombre del local</label>
                <input id="newStoreName" type="text" placeholder=" " class="w-full p-3 bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Correo del cliente</label>
                <input id="newStoreEmail" type="email" placeholder="" class="w-full p-3 bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Contraseña</label>
                <input id="newStorePassword" type="password" placeholder="Mínimo 6 caracteres" class="w-full p-3 bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
              </div>

              <div class="flex gap-3 pt-4">
                  <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-medium transition border border-slate-700">Cancelar</button>
                  <button id="btnCreate" onclick="createStore()" class="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white py-3 rounded-xl font-medium shadow-[0_0_15px_rgba(99,102,241,0.2)] transition flex justify-center items-center">
                    Cargar tienda
                  </button>
              </div>
          </div>

          <div class="mt-6 p-4 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
            <p class="text-xs text-indigo-300 leading-relaxed">
              <strong>Automatizado:</strong> Se creará la cuenta y la tienda con 30 días de acceso automáticamente.
            </p>
          </div>
      </div>
  </div>

  <div id="manageStoreModal" class="fixed inset-0 bg-[#0B1120]/80 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 w-full max-w-md shadow-2xl m-4 fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-white truncate">Editar cuenta</h2>
            <button onclick="closeManageModal()" class="text-slate-500 hover:text-white text-2xl leading-none transition">&times;</button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Nombre</label>
                <input id="manageStoreName" type="text" class="w-full p-3 bg-slate-800 border border-slate-700 text-white rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Correo</label>
                <input id="manageStoreEmail" type="email" class="w-full p-3 bg-slate-800 border border-slate-700 text-white rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Contraseña</label>
                <div class="relative">
                    <input id="manageStorePassword" type="password" class="w-full p-3 bg-slate-800 border border-slate-700 text-white rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm pr-10">
                    <button onclick="togglePasswordVisibility()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Vencimiento (Personalizado)</label>
                <input id="manageStoreDate" type="date" class="w-full p-3 bg-slate-800 border border-slate-700 text-white rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm [color-scheme:dark]">
            </div>
        </div>
        
        <div class="flex gap-3 pt-6">
            <button onclick="closeManageModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-medium transition border border-slate-700">
                Cancelar
            </button>
            <button id="btnSaveManage" onclick="saveStoreChanges()" class="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white py-3 rounded-xl font-medium shadow-[0_0_15px_rgba(99,102,241,0.2)] transition flex justify-center items-center">
                Guardar
            </button>
        </div>

        <div class="mt-4 p-3 bg-amber-500/10 rounded-xl border border-amber-500/20">
            <p class="text-[10px] text-amber-300/80 leading-relaxed text-center">
                Nota: Cambiar el email o clave aquí actualiza la base de datos visual, pero no los datos base de Auth en Supabase.
            </p>
        </div>
    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
